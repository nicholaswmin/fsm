# Tests if package dependencies exceed a limit
# If <= limit, outputs a notice of current counts
# If  > limit, outputs an error and exits: 1

name: test:deps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    name: dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [latest]
    env:
      # Settings
      # dependencies
      MAX_DEPS: 0
      #devDependencies
      MAX_DEV_DEPS: 0
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - run: npm ci

    # get count of dependencies & devDependencies, 
    # computed by counting the number of `:` occurrences in
    # their package.json fields
    - run: | 
        deps=$(npm pkg get dependencies);
        dNum=$(echo "$deps" | tr -cd ':' | wc -c);
        echo "dNum=$dNum" >> "$GITHUB_OUTPUT";
        echo "dNum=$dNum" >> "$GITHUB_ENV";
        
        ddeps=$(npm pkg get devDependencies);
        ddNum=$(echo "$ddeps" | tr -cd ':' | wc -c);
        echo "ddNum=$ddNum" >> "$GITHUB_OUTPUT";
        echo "ddNum=$ddNum" >> "$GITHUB_ENV";
      name: Compute dependency/devDependencies counts
      id: package

    - run: |
        [[ $dnum -lt 5 ]] && a="$c" || a="$d"

        title="⚠️ Too many dependencies"
        ps="OK"
        ds="ERR"
        pl="$MAX_DEPS"
        dl="$MAX_DEV_DEPS"

        echo "### $title" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "|                      | current    | max     | status |"
        echo "| -------------------- | ---------  | ------- | ------ |"
        echo "| \`dependencies\`     | \`$dNum\`  | \`$pl\` | $ps    |"
        echo "| \`devDependencies\`  | \`$ddNum\` | \`$dl\` | $ds    |"

        echo "::error title=deps error"::dependencies limit exceeded"
        exit 1
      name: Output Message
