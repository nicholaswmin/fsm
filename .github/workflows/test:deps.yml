# Tests if package dependencies exceed a limit
# If <= limit, outputs a notice of current counts
# If  > limit, outputs an error and exits: 1

name: test:deps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    name: dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [latest]
    env:
      # Settings
      # dependencies
      MAX_DEP: 0
      #devDependencies
      MAX_DEVDEP: 0
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - run: npm ci

    # get count of dependencies & devDependencies, 
    # computed by counting the number of `:` occurrences in
    # their package.json fields
    - run: | 
        depField=$(npm pkg get dependencies);
        dep=$(echo "$depField" | tr -cd ':' | wc -c);
        echo "dep=$dep" >> "$GITHUB_OUTPUT";
        echo "dep=$dep" >> "$GITHUB_ENV";
        
        depDevField=$(npm pkg get devDependencies);
        devDep=$(echo "$depDevField" | tr -cd ':' | wc -c);
        echo "devDep=$devDep" >> "$GITHUB_OUTPUT";
        echo "devDep=$devDep" >> "$GITHUB_ENV";
      name: Compute dependency counts
      id: package

    - run: |  
        GHS="$GITHUB_STEP_SUMMARY";
        MD="$MAX_DEP";
        MDD="$MAX_DEVDEP";

        dep_s=$([ "$dep"  -le "$MD" ]       && echo "✅" || echo "⚠️");
        devDep_s=$([ "$devDep" -le "$MDD" ] && echo "✅" || echo "⚠️");
        ok=$([[ "$dep_s" = "✅" && "$devDep_s" = "✅" ]] && echo y || echo n);
        s_text=$([[ "$ok" = y ]] && echo "✅ OK" || echo "❌ over limit");

        echo "## Dependencies" >> $GHS;
        echo "> $s_text" >> $GHS;
        echo "" >> $GHS;
        echo "|                   | current    | allowed | status   |" >> $GHS;
        echo "| ------------------| ---------- | ------- | -------  |" >> $GHS;
        echo "|\`dependencies\`   |\`$dep\`   | \`$MD\` | $dep_s    |" >> $GHS;
        echo "|\`devDependencies\`|\`$devDep\`| \`$MDD\`| $devDep_s |" >> $GHS;
        echo "" >> $GHS;
        
        if [[ "$ok" = y ]]; then
          echo >&2 "dependencies over limit, exiting 1"; exit 1;
        fi

      name: Output Message
