# Tests if package dependencies exceed a limit
# If <= limit, outputs a notice of current counts
# If  > limit, outputs an error and exits: 1

name: test:deps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    name: dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [latest]
    env:
      # Settings
      # dependencies
      MAX_DEPS: 0
      #devDependencies
      MAX_DEV_DEPS: 0
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - run: npm ci

    # get count of dependencies & devDependencies, 
    # computed by counting the number of `:` occurrences in
    # their package.json fields
    - run: | 
        deps=$(npm pkg get dependencies);
        dNum=$(echo "$deps" | tr -cd ':' | wc -c);
        echo "dNum=$dNum" >> "$GITHUB_OUTPUT";
        echo "dNum=$dNum" >> "$GITHUB_ENV";
        
        ddeps=$(npm pkg get devDependencies);
        ddNum=$(echo "$ddeps" | tr -cd ':' | wc -c);
        echo "ddNum=$ddNum" >> "$GITHUB_OUTPUT";
        echo "ddNum=$ddNum" >> "$GITHUB_ENV";
      name: Compute dependency/devDependencies counts
      id: package

    - run: |  
        GHS=$GITHUB_STEP_SUMMARY
        MD="$MAX_DEPS";
        MDD="$MAX_DEV_DEPS";

        md_st=$([ "$dNum"  -le "$MAX_DEPS" ]     && echo "✅" || echo "⚠️");
        mdd_st=$([ "$ddNum" -le "$MAX_DEV_DEPS" ] && echo "✅" || echo "⚠️");
        ok=$([[ "$md_s" = "✅" && "$mdd_s" = "✅" ]] && echo "y" || echo "n");
        statustext=$([[ "$ok" = "y" ]] && echo "✅ OK" || echo "❌ over limit");

        echo "## Dependencies" >> $GHS;
        echo "> status: $statustext" >> $GHS;
        echo "" >> $GHS;
        echo "|                    | current   | allowed | status  |" >> $GHS;
        echo "| ------------------ | --------- | ------- | ------- |" >> $GHS;
        echo "| \`dependencies\`   | \`$dNum\` | \`$MD\` | $md_st  |" >> $GHS;
        echo "| \`devDependencies\`| \`$ddNum\`| \`$MDD\`| $mdd_st |" >> $GHS;
        echo "" >> $GHS;
        
        if [[ "$ok" = "y" ]]; then
          echo >&2 "dependencies over limit, exiting 1"; exit 1;
        fi

      name: Output Message
