# Tests if package dependencies exceed a limit
# If <= limit, outputs a notice of current counts
# If  > limit, outputs an error and exits: 1

name: test:deps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    name: dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [latest]
    env:
      # Settings
      # dependencies
      MAX_DEPS: 0
      #devDependencies
      MAX_DDEPS: 0
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - run: npm ci

    # get count of dependencies & devDependencies, 
    # computed by counting the number of `:` occurrences in
    # their package.json fields
    - run: | 
        deps=$(npm pkg get dependencies);
        dNum=$(echo "$deps" | tr -cd ':' | wc -c);
        echo "dNum=$dNum" >> "$GITHUB_OUTPUT";
        echo "dNum=$dNum" >> "$GITHUB_ENV";
        
        ddeps=$(npm pkg get devDependencies);
        ddNum=$(echo "$ddeps" | tr -cd ':' | wc -c);
        echo "ddNum=$ddNum" >> "$GITHUB_OUTPUT";
        echo "ddNum=$ddNum" >> "$GITHUB_ENV";
      name: Compute dependency/devDependencies counts
      id: package

    - run: |
        echo "### Too Many Dependencies" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Lists {dNum} dependencies. Limit: >> $GITHUB_STEP_SUMMARY;
        echo "- Lists {ddNum} devDependencies. Limit: >> $GITHUB_STEP_SUMMARY;
        echo "::error title=deps error"::dependencies limit exceeded"
        exit 1
      if: fromJSON(steps.package.outputs.dNum) > fromJSON(env.MAX_DEPS)
      name: Output Error Message

    # else print OK message
    - run: |
        echo "### Dependencies OK" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Lists {dNum} dependencies. Limit: >> $GITHUB_STEP_SUMMARY;
        echo "- Lists {ddNum} devDependencies. Limit: >> $GITHUB_STEP_SUMMARY;

        echo "::notice title=deps OK"::dependencies are within range"
      name: Oupit Success Message
