# Tests if package dependencies exceed a limit
# If <= limit, outputs a notice of current counts
# If  > limit, outputs an error and exits: 1

name: test:deps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    name: dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [latest]
    env:
      # Settings
      # dependencies
      MAX_DEPS: 0
      #devDependencies
      MAX_DDEPS: 0
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - run: npm ci

    # output count of dependencies & devDependencies
    # computed by counting the number of `:` occurrences
    - run: | 
        deps=$(npm pkg get dependencies);
        depsCount=$(echo "$deps" | tr -cd ':' | wc -c);
        echo "depsCount=$depsCount" >> "$GITHUB_OUTPUT";
        echo "depsCount=$depsCount" >> "$GITHUB_ENV";
        
        ddeps=$(npm pkg get devDependencies);
        ddepsCount=$(echo "$ddeps" | tr -cd ':' | wc -c);
        echo "ddepsCount=$ddepsCount" >> "$GITHUB_OUTPUT";
        echo "ddepsCount=$ddepsCount" >> "$GITHUB_ENV";
      name: get dependencies and devDependencies count
      id: package

    # check runtime dependencies
    - run: |
        ta="too many dependencies" && \
        tb="dependencies" && \
        e="Lists ${depsCount} dependencies. Max limit: ${MAX_DEPS}." && \
        echo "::error title=${ta}::${e}." && \
        echo "::error title=${tb}::${{ steps.package.outputs.deps }}" && \
        exit 1

      if: fromJSON(steps.package.outputs.depsCount) > fromJSON(env.MAX_DEPS)
      name: Too Many Dependencies Error

    # check devDependencies
    - run: |
        t="too many devDependencies" && \
        e="Lists ${ddepsCount} devDependencies. Max limit: ${MAX_DDEPS}." && \
        echo "::error title=${t}::${e}." && exit 1

      if: fromJSON(steps.package.outputs.ddepsCount) > fromJSON(env.MAX_DDEPS)
      name: Too Many devDependencies Error

    # else print OK message
    - run: |
        ta="dependencies count OK" && \
        tb="devDependencies count OK" && \
        a="Lists ${depsCount} dependencies, limit: ${MAX_DEPS}" \
        b="Lists ${ddepsCount} devDependencies, limit: ${MAX_DDEPS}" \

        echo "::notice title=${ta}::${a}." && echo "::notice title=${tb}::${b}."

      name: Dependency Count OK
