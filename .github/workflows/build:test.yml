# Testing a workflwo

name: build:test
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest
          registry-url: 'https://registry.npmjs.org'
      - run: |
          validate() {
            keys=$(jq -n "$1")
            required="$2"
            name="$3"

            for i in "${required[@]}"
              do
              exists=$(jq 'has('\"$i\"')' <<< "$keys")
              value=$(jq  ".$i" <<< "$keys")

              if [ $exists == true ]; then
                if [ -z "${value}" ]; then
                  echo "::error title=param. empty::$i exists but is empty"
                  exit 1
                fi
              else
                echo "::error title=param. missing::$i missing from $name"
                exit 1
              fi
            done
          }
          
          required_secrets=("NPM_TOKEN" "github_token" "mouse")

          validate "$secrets" "$required_secrets" "secrets"

        name: Verify required parameters
        env:
          secrets: ${{ toJSON(secrets) }}
          vars: ${{ toJSON(vars) }}

      - run: |
          ok_title="Package Published!"
          ok_msg_1="Publish was OK."

          echo "::notice title=${ok_title}::${ok_msg_1}"
        name: Success Message
