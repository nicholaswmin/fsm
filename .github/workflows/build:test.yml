# Testing a workflwo

name: build:test
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest
          registry-url: 'https://registry.npmjs.org'
      - run: |
          required=("NPM_TOKEN" "dog" "mouse" "frog")

          keys=$(jq -n "$secrets" | jq 'to_entries | .[].key' --raw-output)
          for i in "${required[@]}"
            do
              if [[ " ${keys[*]} " == *"$i"* ]];
              then
                  echo "YES, your arr contains $i"
              else
                  echo "NO, your arr does not contain $i"
              fi
          done
        name: Verify required parameters
        env:
          secrets: ${{ toJSON(secrets) }}
          vars: ${{ toJSON(vars) }}

      - run: |
          ok_title="Package Published!"
          ok_msg_1="Publish was OK."

          echo "::notice title=${ok_title}::${ok_msg_1}"
        name: Success Message
