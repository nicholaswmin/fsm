# Tests ESM module filesize 
# - Exits 1 if above a set limit, in bytes.
# - Bundles, minifies and gzips the module before testing for size.
name: test:size

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [latest]
    env:
      # Settings
      ENTRY_PATH: src/index.js
      DIST_PATH: dist/index.js
      LIMIT_BYTES: 999
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm i -g @vercel/ncc
      # bundle and minify module
    - run: ncc build "$ENTRY_PATH" -o dist -m
      name: Bundle & minify module
      # compress bundle
    - run: gzip "$DIST_PATH"
      name: Gzip minified bundle
      # get compressed bundle size in bytes 
    - run: echo SIZE=$(wc -c < $DIST_PATH.gz | xargs) >> "$GITHUB_ENV"
      name: Get compressed size
      id: getsize
      # print size
    - run: echo "::notice title=size::minified & gzipped size is ${SIZE} bytes";
      name: Print compressed size
      # if size > limit, print error message, exit 1
    - run: |
        echo "::error title=too big::exceeds limit of ${LIMIT_BYTES} bytes" 
        >&2 && exit 1
      if: steps.getsize.outputs.size > env.LIMIT_BYTES
      name: Print limit exceeded error message
      # if size <= limit, print sucess message
    - run: echo "::notice title=is ok::within limit of ${LIMIT_BYTES} bytes"
      if: steps.getsize.outputs.size <= env.LIMIT_BYTES
      name: Print within limit success message
