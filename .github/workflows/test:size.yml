# Tests ESM module filesize 
# - Fails if they become too big
# - Bundles, minifies and gzips the module before testing.
name: test:size

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [latest]
    env:
      ENTRY_PATH: src/index.js
      OUTPUT_PATH: dist/index.js
      LIMIT_BYTES: 999
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm i -g @vercel/ncc
    - run: ncc build "$ENTRY_PATH" -o dist -m
      name: Bundle & minify module
    - run: gzip "$OUTPUT_PATH"
      name: Gzip minified bundle
    - run: |
        size=$(wc -c < $OUTPUT_PATH.gz | xargs);
        echo "::notice title=size::file size is: ${size} bytes";
        test "$size" -lt "$BYTE_LIMIT" &&
        echo "::notice title=is okay::size within ${LIMIT_BYTES} bytes limit" ||
        (echo "::error title=too big::size exceeds ${LIMIT_BYTES} bytes limit" 
        >&2 && exit 1);
      name: Compare gzipped file size
    # cleanup
    - run: npm r -g ncc; rm -rf dist/
