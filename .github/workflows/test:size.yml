# Tests ESM module filesize 
# - Exits 1 if above a set limit, in bytes.
# - Bundles, minifies and gzips the module before testing for size.
name: test:size

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [latest]
    env:
      # Settings
      ENTRY_PATH: src/index.js
      DIST_PATH: dist/index.js
      LIMIT_B: 900
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm i -g @vercel/ncc
      name: Install bundler (ncc)
      # bundle and minify module
    - run: ncc build "$ENTRY_PATH" -o dist -m
      name: Bundle & minify module
      # compress bundle
    - run: gzip "$DIST_PATH"
      name: Gzip minified bundle
      # get compressed bundle size in bytes 
    - run: echo size=$(wc -c < $DIST_PATH.gz | xargs) >> "$GITHUB_ENV"
      name: Get compressed size in bytes
      id: getsize
      # print size
    - run: echo "::notice title=report::bundled & gzipped size is ${size} B"
      name: Print compressed size
      # if size > limit, print error message
    - run: |
        echo "::error title=size too big::size: ${size} B > limit: ${LIMIT_B} B"
      if: steps.getsize.outputs.size > 900
      name: Print Limit Exceeded Error
      # if size > limit, exit 1
    - run: exit 1
      if: steps.getsize.outputs.size > 900
      name: Exit 1
      # if size <= limit, print sucess message
    - run: |
        echo "::notice title=size ok::size: ${size} B <= limit: ${LIMIT_B} B"
      if: steps.getsize.outputs.size <= 900
      name: Print Success Message
