# Tests if an ESM module filesize exceeds a limit,
# after bundling, min. and gzip.
#
# If <= limit, outputs a notice of current size
# If  > limit, outputs an error and exits: 1

name: test:size

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: esm_size
    environment: CI 
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js - latest
      uses: actions/setup-node@v4
      with:
        node-version: latest
        cache: 'npm'

      env:
        # Debug
        VARS_JSON: ${{ toJSON(env) }}

        # Required
        MAX_BYTES: ${{ vars.MAX_BUNDLE_BYTES || '999' }}
        ENTRY_DIR: ${{ vars.ENTRY_DIR || 'src' }}
        ENTRY_FILENAME: ${{ vars.ENTRY_PATH || 'index.js' }}
  
        # Computed
        BUNDLE_DIR: ${{ runner.temp }}

    - run: |
        echo ENTRY_PATH=${{ vars.ENTRY_DIR }}/${{ vars.ENTRY_FILENAME }} \
          >> "$GITHUB_ENV"
        echo BUNDLE_FILENAME=${{ env.ENTRY_FILENAME }} >> "$GITHUB_ENV"
        echo BUNDLE_PATH=${{ env.BUNDLE_DIR }}/${{ env.ENTRY_FILENAME }}
      name: Set envs

    - run: env
      name: Log envs

    - run: npm ci
      name: Install module dependencies

    - run: npm i -g @vercel/ncc
      name: Install bundler

    - run: ncc build $ENTRY_PATH -o $TEMP_DIR -m -q
      name: Bundle & minify module

    - run: gzip $TEMP_DIR/$ENTRY_FILENAME
      name: Compress minified bundle

    - run: | 
        echo bytes=$(wc -c < $TEMP_DIR/bundle.js.gz | xargs) \
          >> "$GITHUB_OUTPUT";
      name: Compute compressed bundle filesize
      id: size

    # if size > max, err message & exit 1
    - run: |
        title="Error: bundled size over limit"
        msg="size: $bytes bytes > max: $MAX_BYTES bytes"

        echo "::error title=$title::$msg"
        exit 1
      if: |
        fromJSON(steps.size.outputs.bytes) > fromJSON(vars.MAX_BYTES)
      name: Size Exceeded Error

    # else if size <= max, sucess message & exit 0
    - run: |
        title="Success: bundled size within limit"
        msg="size: $bytes bytes <= max: $MAX_BYTES bytes"


        echo "::notice title=$title::$msg"
      if: fromJSON(steps.getsize.outputs.size) <= fromJSON(env.MAX_BYTES)
      name: Success Message
