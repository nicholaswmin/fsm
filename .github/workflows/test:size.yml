# Tests ESM module filesize 
# - Exits 1 if above a set limit, in bytes.
# - Bundles, minifies and gzips the module before testing for size.
name: test:size

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [latest]
    env:
      # Settings
      ENTRY_PATH: src/index.js
      DIST_PATH: dist/index.js
      MAX_B: 900
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm i -g @vercel/ncc
      name: Install bundler (ncc)
      # bundle and minify module
    - run: ncc build "$ENTRY_PATH" -o dist -m
      name: Bundle & minify module
      # compress bundle
    - run: gzip "$DIST_PATH"
      name: Gzip minifieds bundle
      # output bundle size in bytes, as 'sz' 
    - run: echo sz=$(wc -c < $DIST_PATH.gz | xargs) >> "$GITHUB_ENV"
      name: Get compressed size in bytes
      id: getsize
      # print sz
    - run: echo "::notice title=report::bundled & gzipped size is ${sz} B"
      name: Print compressed size
      # sz > limit, print error message, exit 1
    - run: |
        echo "::error title=too big::size: ${sz} B > limit: ${MAX_B} B"; exit 1
      if: ${{ steps.getsize.outputs.sz }} > ${{ env.MAX_B }}
      name: Limit Exceeded Error
      # sz <= limit, print sucess message
    - run: |
        echo "::notice title=size ok::size: ${sz} B <= limit: ${MAX_B} B"
      if: ${{ steps.getsize.outputs.sz }} <= ${{ env.MAX_B }}
      name: Print Success Message
