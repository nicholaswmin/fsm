# Tests ESM module filesize 
# - Exits 1 if above a set limit, in bytes.
# - Bundles, minifies and gzips the module before testing for size.
name: test:size

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [latest]
    env:
      # Settings
      # entry module filepath
      ENTRY_PATH: src/index.js
      # bundle filepath
      DIST_PATH: dist/index.js
      # max bundle size, bytes
      LIMIT_BYTES: 990
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm i -g @vercel/ncc
      name: Install bundler (ncc)
      # bundle and minify module
    - run: ncc build "$ENTRY_PATH" -o dist -m
      name: Bundle & minify module
      # compress bundle
    - run: gzip "$DIST_PATH"
      name: Gzip minifieds bundle
      # output bundle size in bytes, as 'size', 
      # in both output and env
    - run: | 
        size=$(wc -c < $DIST_PATH.gz | xargs);
        echo "size=$size" >> "$GITHUB_OUTPUT";
        echo "size=$size" >> "$GITHUB_ENV";
      name: Get compressed size in bytes
      id: getsize
      # print size
    - run: echo "::notice title=report::bundled & gzipped size is ${size} B"
      name: Print compressed size
      # if size > limit, print error message, exit 1
    - run: |
        echo "the value is ${{ steps.getsize.outputs.size }}"
    - run: |
        echo "::error title=err::size: ${size} B > limit: ${LIMIT_BYTES} B"; \
        exit 1
      if: fromJSON(steps.getsize.outputs.size) > fromJSON(env.LIMIT_BYTES)
      name: Limit Exceeded Error
      # if size <= LIMIT_BYTES, print sucess message
    - run: |
        echo "::notice title=ok::size: ${size} B <= limit: ${LIMIT_BYTES} B"
      if: fromJSON(steps.getsize.outputs.size) <= fromJSON(env.LIMIT_BYTES)
      name: Print Success Message
