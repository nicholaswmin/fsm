# Tests if an ES module size exceeds a limit.  
# The module is bundled, minified & compressed before testing.
# 
# Required Parameters:
# > set as repository env. variables in repo settings
#
# - `SIZE_LIMIT_MAX_BYTES` : max filesize limit, bytes, i.e `999`
# - `SIZE_LIMIT_ENTRY_PATH`: module entry path, i.e `src/index.js`
#
# Uses:
#
# - bundler: `@vercel/ncc`
# - compressor: `gzip`
#
# Outputs:
#
# - if below limit: `notice` of filesize & exit code: 0 
# - if above limit: `error` of filesize & exit code: 1


name: test:size

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: size
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [latest]
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - run: |
        parameters=("TEST_SIZE_MAX_BYTES" "TEST_SIZE_ENTRY_PATH") \
        
        title="parameter missing" \
        err_msg="is missing, or empty" \
        tip_msg_1="Parameters must be set as repository variables" \
        tip_msg_2="Set in: Repo Settings -> Secrets & Variables -> Actions" \
        
        for name in ${parameters[@]}; do \
          var=${!name}; \
          echo "value: $var";\
        done
      name: Check required parameters
      
    - run: npm ci
      name: Install module dependencies

    - run: npm i -g @vercel/ncc
      name: Install module bundler

    - run: ncc build "${{ vars.TEST_SIZE_ENTRY_PATH }}" -o .test_size_temp -m
      name: Bundle & minify module

    - run: gzip .test_size_temp/index.js
      name: Compress bundle

    # output bundle size in bytes, as 'n'
    - run: | 
        size=$(wc -c < .test_size_temp/index.js.gz | xargs);
        echo "n=$size" >> "$GITHUB_OUTPUT";
        echo "n=$size" >> "$GITHUB_ENV";
      name: Compute compressed bundle size
      id: getsize
      
    - run: | 
        echo "n: $steps.getsize.outputs.n, env1: $vars.TEST_SIZE_MAX_BYTES"
      name: Log


    # if s > max, err message & exit 1
    - run: |
        title="size limit exceeded" && \
        message="size: ${n} B > max: ${{ vars.TEST_SIZE_MAX_BYTES }} B" \

        echo "::error title=${title}::${message}" && exit 1;
      if: fromJSON(steps.getsize.outputs.n) > fromJSON(vars.TEST_SIZE_MAX_BYTES)
      name: Throw Error

    # else if s <= max, sucess message & exit 0
    - run: |
        title="size OK" && \
        message="size: ${n} B <= max: ${{ vars.TEST_SIZE_MAX_BYTES }} B" \

        echo "::notice title=${title}::${message}";
      if: fromJSON(steps.getsize.outputs.n) <= fromJSON(vars.TEST_SIZE_MAX_BYTES)
      name: Output OK Message

    - run: | 
        npm uninstall -g @vercel/ncc;
        rm -rf .test_size_output;
      name: Cleanup
