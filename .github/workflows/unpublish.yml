# unpublish from npm if it's Github Release was deleted/unpublished.

name: npm:unpublish
on:
  release:
      types:
        - deleted
        - unpublished

jobs:
  npm-unpublish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout ${{ github.event.release.default_branch }}
        uses: actions/checkout@v4
        with: 
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          registry-url:  'https://registry.npmjs.org'

      - name: Unpublish from npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          name="$(npm pkg get name | tr -d '"')"
          version="$(npm pkg get version | tr -d '"v')"

          out=$(npm unpublish "${name}@{$version}")
          
          printf "::notice title=npm unpublish: %s::out: %s" "${name}" "${out}"
